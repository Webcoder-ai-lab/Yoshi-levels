<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideeën — Yoshi-levels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #16162a;
      border: 1px solid #334;
      border-radius: 12px;
      padding: 30px;
      max-width: 640px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      color: #4bc84b;
      margin-bottom: 4px;
      text-align: center;
    }
    p {
      color: #888;
      font-size: 14px;
      text-align: center;
      margin-bottom: 20px;
    }
    iframe {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: transparent;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: #4bc84b;
      font-size: 13px;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>💡 Ideeën?</h1>
    <p>Heb je een idee voor Yoshi-levels? Laat het me weten!</p>
    <iframe src="https://docs.google.com/forms/d/1JnS94eVFVZJetwEtI7zoYj0CLfpPQ0UBVOjYif4hFHE/viewform?embedded=true" height="480">Laden…</iframe>
    <a class="back" href="yoshi.html">← Terug naar de game</a>
  </div>
</body>
</html>
