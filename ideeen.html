<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideeën — Yoshi-levels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #16162a;
      border: 1px solid #334;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 32px;
      color: #4bc84b;
      margin-bottom: 8px;
    }
    p {
      color: #888;
      font-size: 15px;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: #4bc84b;
      color: #0a0a1a;
      padding: 16px 40px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #3aa83a; }
    .back {
      display: block;
      margin-top: 20px;
      color: #4bc84b;
      font-size: 13px;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>💡 Ideeën?</h1>
    <p>Heb je een idee voor Yoshi-levels?<br>Laat het me weten via het formulier!</p>
    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSequ4VAP7eUKp8gxCOa60h6qo3qPPesc25P9acnGoW7asKhDg/viewform" target="_blank">📝 Open formulier</a>
    <a class="back" href="yoshi.html">← Terug naar de game</a>
    <div style="text-align:center;color:#555;font-size:11px;margin-top:16px">v0.4</div>
  </div>
</body>
</html>
