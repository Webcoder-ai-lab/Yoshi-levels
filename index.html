<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Station 2P MVP</title>
  <style>
    :root { --bg: #000; --fg: #fff; }
    html, body { height: 100%; margin: 0; background: #000; color: #fff; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
    #gameWrapper { width: 100%; height: 100%; display: grid; place-items: center; padding: 16px; box-sizing: border-box; }
    canvas { background: #000; width: min(90vw, 1000px); height: auto; border: 1px solid #333; image-rendering: crisp-edges; }
    #hud { position: fixed; top: 8px; left: 8px; color: #0f0; font-family: monospace; z-index: 10; }
  </style>
</head>
<body>
  <div id="hud">Space Station 2P MVP</div>
  <div id="gameWrapper">
    <canvas id="gameCanvas" width="960" height="540" tabindex="0" aria-label="Space station 2-speler canvas"></canvas>
  </div>
  <script src="./space-mvp2.js"></script>
</body>
</html>
