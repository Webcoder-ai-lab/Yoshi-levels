<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yorsi — Platformer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0a0a1a;
      color: #fff;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #gameWrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas {
      background: #1a2a3a;
      width: min(94vw, 960px);
      height: auto;
      aspect-ratio: 960 / 540;
      border: 2px solid #334;
      border-radius: 4px;
      image-rendering: crisp-edges;
      display: block;
    }
    #info {
      font-size: 13px;
      color: #889;
      text-align: center;
      line-height: 1.5;
      padding: 0 8px;
    }
    #info kbd {
      background: #222;
      border: 1px solid #445;
      border-radius: 3px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 12px;
      color: #dde;
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="c" width="960" height="540" tabindex="0"></canvas>
    <div id="info">
      <kbd>&larr;</kbd><kbd>&rarr;</kbd> lopen &middot; <kbd>Space</kbd> springen &middot; <kbd>Shift</kbd> tong/ei &mdash;
      <kbd>A</kbd><kbd>D</kbd> lopen &middot; <kbd>F</kbd> springen &middot; <kbd>E</kbd> tong/ei
    </div>
  </div>
  <script src="dist/yorsi.js"></script>
</body>
</html>
